# Python Debugging Agent Configuration
# ArkSim evaluation for terminal-based debugging agent
#
# Usage: arksim simulate-evaluate config.yaml

# ── AGENT CONFIGURATION ────────────────────────────────────────────────────

agent_config:
  agent_type: custom
  agent_name: debug-agent
  custom_config:
    module_path: ./debug_agent_wrapper.py

# ── SIMULATION SETTINGS ──────────────────────────────────────────────────────

scenario_file_path: ./scenarios.json
num_conversations_per_scenario: 1
max_turns: 3
output_file_path: ./results/simulation/simulation.json
simulated_user_prompt_template: null

# ── EVALUATION SETTINGS ──────────────────────────────────────────────────────

output_dir: ./results/evaluation

metrics_to_run:
  - faithfulness
  - helpfulness
  - coherence
  - relevance
  - goal_completion

generate_html_report: true

# Numeric thresholds
numeric_thresholds:
  overall_score: 0.6
  goal_completion: 0.7

# ── SHARED SETTINGS ──────────────────────────────────────────────────────────

model: gpt-4o-mini
provider: openai
num_workers: 10
